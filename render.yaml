version: 1
services:
  - type: web
    name: visionmind-backend
    env: docker
    plan: free
    region: oregon
    buildCommand: ""
    startCommand: ""
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: visionmind-db
          property: connectionString
      - key: OPENAI_API_KEY
        type: secret
      - key: TESSERACT_CMD
        value: /usr/bin/tesseract
      - key: TESSDATA_PREFIX
        value: /usr/share/tesseract-ocr/4.00/tessdata
    autoDeploy: true
    healthCheckPath: /health

databases:
  - name: visionmind-db
    databaseName: visionmind
    user: visionmind_user
    plan: free
    region: oregon